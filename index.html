<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Configuración básica del documento -->
  <meta charset="UTF-8" /> <!-- Permite usar acentos y caracteres especiales -->
  <meta http-equiv="X-UA-Compatible" content="IE=Edge" /> <!-- Compatibilidad con navegadores -->
  <meta name="viewport" content="width=device-width, initial-scale=1" /> <!-- Responsive -->

  <title>Greeting Card</title>

  <!-- Archivo de estilos externo -->
  <link rel="stylesheet" href="s.css" />

  <!-- Meta tags para compartir en redes (Facebook, Twitter, etc.) -->
  <meta name="twitter:card" content="summary" />
  <meta property="og:title" content="Wish Card" />
  <meta property="og:site_name" content="Wish Card" />
  <meta property="og:url" content="https://wishcard.free.nf/C2.php?code=8eDGZEQI" />
  <meta property="og:image" content="https://wishcard.free.nf/bgimg/wishcard.jpg" />
  <meta property="og:image:width" content="402" />
  <meta property="og:image:height" content="548" />
  <meta property="og:type" content="website" />

  <!-- Evita que la página sea indexada por Google -->
  <meta name="robots" content="noindex,nofollow">
</head>

<body>
    
    
    <!-- Musica de cumpleaños -->
<audio id="music" loop>
  <source src="cepillin.mp3" type="audio/mpeg">
</audio>
    
  <!-- Texto simple fuera de la tarjeta -->
  <h2>Hi</h2>

  <!-- Contenedor principal -->
  <div class="body">

    <!-- Contenedor de toda la tarjeta -->
    <div class="birthdayCard">

      <!-- Parte que contiene la animación de apertura -->
      <div class="card">

        <!-- Contenedor interno que se rota (flip 3D con CSS) -->
        <div class="card-inner">

          <!-- PARTE FRONTAL DE LA TARJETA -->
          <div class="cardFront">

            <!-- Título frontal -->
            <h3 id="title" class="happy">
              Feliz Cumple 🎂
            </h3>

            <!-- Globos decorativos (hechos con CSS) -->
            <div class="balloons">
              <div class="balloonOne"></div>
              <div class="balloonTwo"></div>
              <div class="balloonThree"></div>
              <div class="balloonFour"></div>
            </div>

            <!-- Pastel -->
            <div class="plate">
              <div class="cake"></div> <!-- Base del pastel -->
              <div class="flame"></div> <!-- Vela/flama -->
            </div>

          </div>

          <!-- PARTE TRASERA DE LA TARJETA -->
          <div class="card-back">
            <!-- GIF decorativo -->
            <img src="bgimg/birthday.gif" loading="lazy">
          </div>

        </div>
      </div>

      <!-- CONTENIDO INTERNO (mensaje al abrir la tarjeta) -->
      <div class="cardInside">

        <!-- Título interno -->
        <h3 id="title" class="back">
          Feliz Cumpleaños 🎂
        </h3>

        <!-- Nombre de la persona -->
        <p id="title">
          Diana
        </p>

        <!-- Mensaje personalizado -->
        <p id="desc">
          Pasatela bonito 
        </p>

        <!-- Firma -->
        <p id="name" class="name">
          Cris
        </p>

      </div>

    </div>
  </div>



<script src="l.js"></script>
</body>
</html>
